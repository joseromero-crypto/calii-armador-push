name: Push Notify Relay

# Manually dispatchable relay so the V4 Claude Routine (whose cloud sandbox
# has restricted network egress and cannot reach alarm6am.netlify.app
# directly - confirmed 2026-07-18, see V2-BUILD-SPEC.md #11.1) can still
# trigger a real push. GitHub's own API (api.github.com) IS reachable from
# the routine's sandbox, and this runner has unrestricted internet access,
# so the routine dispatches this workflow instead of calling Netlify itself.

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Notification title"
        required: true
        type: string
      body:
        description: "Notification body"
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call Netlify /api/notify
        run: |
          curl -sS -G "https://alarm6am.netlify.app/api/notify" \
            --data-urlencode "token=JoS9t4NekJ4drs5eclMyJXwFLllnnM_5" \
            --data-urlencode "title=${{ inputs.title }}" \
            --data-urlencode "body=${{ inputs.body }}"
